services:
  yt-deck:
    build:
      context: .
      args:
        VITE_YOUTUBE_CLIENT_ID: ${VITE_YOUTUBE_CLIENT_ID}
        VITE_YOUTUBE_CLIENT_SECRET: ${VITE_YOUTUBE_CLIENT_SECRET}
    restart: unless-stopped

  caddy:
    image: caddy:2
    ports:
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
    depends_on:
      - yt-deck
    restart: unless-stopped

volumes:
  caddy_data:
