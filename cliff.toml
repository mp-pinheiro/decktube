# git-cliff ~ DeckTube release configuration.
# Conventional-commit changelog + semantic-version bump. git-cliff is read-only over git
# history, and jj commits are real git commits, so it works unchanged in this colocated
# jj+git repo. Version-bump commits use the bare version as subject ("0.17.1"); they are
# unconventional and therefore filtered out of the changelog automatically. See VCS.md.

[changelog]
header = """
# Changelog

All notable changes to DeckTube. Generated from conventional commits by
[git-cliff](https://git-cliff.org) — do not edit by hand; `make bump` regenerates it.
DeckTube follows [Semantic Versioning](https://semver.org).
\n
"""
body = """
{% if version -%}
    ## [{{ version | trim_start_matches(pat="v") }}] - {{ timestamp | date(format="%Y-%m-%d") }}
{% else -%}
    ## [Unreleased]
{% endif -%}
{% for group, commits in commits | group_by(attribute="group") %}
    ### {{ group | upper_first }}
    {% for commit in commits %}
        - {{ commit.message | split(pat="\n") | first | upper_first | trim }}\
    {% endfor %}
{% endfor %}\n
"""
footer = """
{% for release in releases -%}
    {% if release.version and release.previous.version -%}
        [{{ release.version | trim_start_matches(pat="v") }}]: \
            https://github.com/mp-pinheiro/decktube/compare/{{ release.previous.version }}..{{ release.version }}
    {% endif -%}
{% endfor %}
<!-- generated by git-cliff -->
"""
trim = true

[git]
conventional_commits = true
filter_unconventional = true
split_commits = false
commit_parsers = [
    { message = "^chore\\(release\\)", skip = true },
    { message = "^chore\\(deps\\)", skip = true },
    { message = "^ci", skip = true },
    { message = "^feat", group = "Features" },
    { message = "^fix", group = "Bug Fixes" },
    { message = "^docs", group = "Documentation" },
    { message = "^perf", group = "Performance" },
    { message = "^refactor", group = "Refactoring" },
    { message = "^test", group = "Tests" },
    { message = "^cleanup", group = "Chores" },
    { message = "^chore", group = "Chores" },
]
filter_commits = false
tag_pattern = "v[0-9].*"
topo_order = false
sort_commits = "oldest"

[bump]
features_always_bump_minor = true
breaking_always_bump_major = false
